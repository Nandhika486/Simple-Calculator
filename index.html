<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
  </head>
  <body>
    <div class="calculator-container">
        <div class="display"></div>


      <div class="whole-container">
        <div class="first-row">
        <button class="operator-button js-ac-button">AC</button>
        <button class="operator-button js-bracket-button">()</button>
        <button class="operator-button js-input">%</button>
        <button class="operator-button js-input">÷</button>
      </div>
      <div class="second-row">
        <button class="number-button js-input">7</button>
        <button class="number-button js-input">8</button>
        <button class="number-button js-input">9</button>
        <button class="operator-button js-input">×</button>
      </div>


      <div class="third-row">
        <button class="number-button js-input">4</button>
        <button class="number-button js-input">5</button>
        <button class="number-button js-input">6</button>
        <button class="operator-button js-input">-</button>
      </div>


      <div class="fourth-row">
        <button class="number-button js-input">1</button>
        <button class="number-button js-input">2</button>
        <button class="number-button js-input">3</button>
        <button class="operator-button js-input">+</button>
      </div>


      <div class="fifth-row">
        <button class="number-button js-input">0</button>
        <button class="number-button js-input">.</button>
        <button class="number-button js-wrong-button">&#9003;</button>
        <button class="equal-button js-equal-button">=</button>
      </div>


      </div>
     
    </div>
    <script src="calculator.js"></script>


  </body>
</html>
